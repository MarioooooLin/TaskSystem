<!DOCTYPE html>

<body>

    <header class="top-nav"></header>

    <div class="content-wrapper">

        <!-- MAIN CONTENT -->
        <main class="main-content ci-main">
            <div class="content-card">

                <div class="ci-top-bar">

                        <h1 class="ci-page-title">企業資料維護</h1>

                        </div>
                    </div>
                    <div class="ci-panel__body">
                        <div class="ci-form-grid">
                            <div class="ci-form-group">
                                <label class="ci-form-label">完整/創辦叫稱</label>
                                <input type="text" class="ci-form-input" value="盛世旅遊事業股份有限公司">

                            </div>
                            <div class="ci-form-group">
                                <label class="ci-form-label">統一編號</label>
                                <input type="text" class="ci-form-input" value="88223344">
                            </div>
                            <div class="ci-form-group">
                                <label class="ci-form-label">公司電話</label>
                                <input type="tel" class="ci-form-input" value="02-2345-6789">
                            </div>
                            <div class="ci-form-group">
                                <label class="ci-form-label">傳真</label>
                                <input type="tel" class="ci-form-input" value="02-2345-6790">
                            </div>
                            <div class="ci-form-group">
                                <label class="ci-form-label">公司信箱</label>
                                <input type="email" class="ci-form-input" value="service@sstravel.com.tw">
                            </div>
                        </div>
                    </div>
                </div><!-- /.ci-panel -->

                <!-- ===== 聯絡窗口清單 ===== -->
                <div class="ci-panel" id="ciContactPanel">
                    <div class="ci-panel__header">
                        <div class="ci-panel__title">
                            <i class="fa-solid fa-user-group"></i>
                            聯絡窗口清單
                        </div>
                        <button class="ci-add-btn" id="ciAddContactBtn">
                            <i class="fa-solid fa-plus"></i> 新增聯絡人
                        </button>
                    </div>

                    <!-- 聯絡人卡片列表 -->
                    <div class="ci-contact-list" id="ciContactList">

                        <!-- 聯絡人卡片 範本（重複） -->
                        <div class="ci-contact-card">
                            <div class="ci-contact-card__header">

                                <button class="ci-contact-card__remove"><i class="fa-solid fa-trash-can"></i> 移除</button>

                            <div class="ci-form-grid">
                                <div class="ci-form-group">
                                    <label class="ci-form-label">電話</label>

                            <div class="ci-form-grid">
                                <div class="ci-form-group">
                                    <label class="ci-form-label">電話</label>
                                    <input type="tel" class="ci-form-input" value="02-23456789">
                                </div>
                                <div class="ci-form-group">
                                    <label class="ci-form-label">分機</label>
                                    <input type="text" class="ci-form-input" value="101">

                                <div class="ci-form-group">
                                    <label class="ci-form-label">手機</label>

                                <div class="ci-form-group">
                                    <label class="ci-form-label">電子信箱</label>
                                    <input type="email" class="ci-form-input" value="wang@example.com">
                                </div>
                                <div class="ci-form-group">
                                    <label class="ci-form-label">傳真</label>
                                    <input type="tel" class="ci-form-input" value="02-23456790">

                                <div class="ci-form-group">
                                    <label class="ci-form-label">備註</label>
                                    <input type="text" class="ci-form-input" value="週一至週五 09:00-18:00">

                            </div>
                        </div>

                    </div><!-- /#ciContactList -->
                </div><!-- /.ci-panel -->

            </div><!-- /.content-card -->

        <!-- FOOTER -->
        <footer class="footer"></footer>
        <script>$('footer.footer').load('footer.html');</script>

    </div><!-- /.content-wrapper -->

    <div class="ci-action-bar" id="ciActionBar">
        <div class="ci-action-bar__hint">
            <i class="fa-solid fa-circle-info"></i>
            <span>上次更新於：2023-11-20 14:30:00 (Admin)</span>
        </div>
        <div class="ci-action-bar__right">
            <button class="ci-btn ci-btn--outline" id="ciCancelBottomBtn">取消</button>
            <button class="ci-btn ci-btn--primary" id="ciSaveBottomBtn">
