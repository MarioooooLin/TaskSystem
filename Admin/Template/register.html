<!doctype html>
<html>

<head>
   <meta charset="utf-8">
   <title>申請註冊</title>
   <meta name="keywords" content="">
   <meta name="description" content="">
   <meta name="author" content="dannykids">
   <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
   <meta name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
   <link rel="SHORTCUT ICON" href="favicon.ico">
   <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
   <link rel="stylesheet" type="text/css" media="all" href="css/reset.css" />
   <link rel="stylesheet" type="text/css" href="css/w3.css" />
   <link rel="stylesheet" type="text/css" media="all" href="css/login.css" />
   <link rel="stylesheet" type="text/css" media="all" href="css/register.css" />
</head>

<body>
   <div class="md_transition"></div>
   <div class="wrap">
      <div class="main">
         <div class="wrap_left">
            <div class="login_image"><img src="images/login_image.jpg" alt="" /></div>
         </div>
         <div class="wrap_right">
            <div class="login_wrap">
               <div class="page_title">申請註冊</div>
               <div class="input_box">
                  <ul>
                     <li>
                        <label class="field_label">業者名稱</label>
                        <input type="text" placeholder="請輸入業者名稱">
                     </li>
                     <li>
                        <label class="field_label">統一編號</label>
                        <input type="text" placeholder="請輸入統一編號">
                     </li>
                     <li>
                        <label class="field_label">聯絡人姓名</label>
                        <input type="text" placeholder="請輸入聯絡人姓名">
                     </li>
                     <li>
                        <label class="field_label">電子郵件地址</label>
                        <input type="text" placeholder="email@company.com">
                     </li>
                     <li>
                        <label class="field_label">密碼</label>
                        <div class="password_wrap">
                           <input id="password-field1" name="password" type="password" required="" placeholder="">
                           <button type="button" class="pw_toggle_btn" data-target="password-field1"
                              aria-label="顯示或隱藏密碼"><i class="fa-regular fa-eye"></i></button>
                        </div>
                     </li>
                     <li>
                        <label class="field_label">確認密碼</label>
                        <div class="password_wrap">
                           <input id="password-field2" name="password_confirm" type="password" required=""
                              placeholder="">
                           <button type="button" class="pw_toggle_btn" data-target="password-field2"
                              aria-label="顯示或隱藏密碼"><i class="fa-regular fa-eye"></i></button>
                        </div>
                     </li>
                     <li>
                        <label class="terms_row">
                           <input type="checkbox">
                           <span class="prm-checkmark"></span>
                           <span>我已閱讀並同意 <a href="#">服務條款</a> 與 <a href="#">隱私權政策</a>。</span>
                        </label>
                     </li>
                     <li>
                        <div class="btn login_btn"><a href="#"
                              onclick="document.getElementById('id1').style.display='block'">立即註冊</a></div>
                     </li>
                  </ul>
               </div>
               <div class="register_link">已有帳號？<a href="login.html">前往登入</a></div>
            </div>

         </div>
      </div>
   </div>
   <footer>
      <div class="copyright">此系統已通過 SSL安全金融交易認證 <br class="br-break">系統開發單位：<a href="https://www.taiwantravelmap.com/"
            target="_blank">台灣旅圖資訊</a><br class="br-break">
         2026 Taiwantravelmap Co Ltd. All Rights Reserved.</div>
   </footer>
   <div id="id1" class="w3-modal">
      <div class="bg_close" onclick="document.getElementById('id1').style.display='none'"></div>
      <div class="w3-modal-content w3-animate-top w3-card-4 alert-modal">
         <span class="alert-close" onclick="document.getElementById('id1').style.display='none'">&times;</span>
         <div class="modal-body reg-success-body">
            <div class="reg-success-icon">
               <i class="fa-regular fa-envelope"></i>
            </div>
            <div class="reg-success-title">註冊成功</div>
            <p class="reg-success-desc">感謝您的申請。我們已向您的電子信箱發送了一封驗證信，請至 E-mail 中點擊連結以啟用帳號。</p>
            <a href="login.html" class="reg-success-btn">回到登入頁</a>
            <p class="reg-success-note">若沒收到信件，請檢查垃圾信件夾或稍後再試。</p>
         </div>
      </div>
   </div>
   <script type="text/javascript" src="js/pw-toggle.js" crossorigin="anonymous"></script>
</body>

</html>
